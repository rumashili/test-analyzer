<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Score Analyzer - Pro</title>
  
  <!-- Tailwind CSSの読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* カスタムスクロールバーと印刷時の詳細設定 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    
    @media print {
      body {
        background-color: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      @page {
        margin: 1cm;
        size: A4 portrait;
      }
      textarea {
        overflow: visible !important;
      }
      .print\:min-h-\[120px\] {
        min-height: 120px !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <!-- Reactアプリがマウントされる場所 -->
  <div id="root">
    <!-- 読み込み中の表示 -->
    <div class="min-h-screen bg-gray-50 flex items-center justify-center">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
    </div>
  </div>

  <!-- React関連のモジュールを読み込む設定 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.300.0"
      }
    }
  </script>
  
  <!-- ブラウザでJSXを翻訳するためのBabel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Reactのコード本体 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Plus, Trash2, BarChart2, Hexagon, Filter, Save, X, FileText, Printer, CheckSquare, Edit2, Calendar, ChevronLeft, ChevronRight, TrendingUp, Folder, ArrowLeft, Settings } from 'lucide-react';

    // グラフ描画用コンポーネント (レーダー & 棒グラフ)
    const ChartView = ({ data, type, isSelfScoringEnabled }) => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const [chartLibLoaded, setChartLibLoaded] = useState(!!window.Chart);

      useEffect(() => {
        if (window.Chart) {
          setChartLibLoaded(true);
          return;
        }
        const scriptId = 'chartjs-cdn-script';
        let script = document.getElementById(scriptId);
        if (!script) {
          script = document.createElement('script');
          script.id = scriptId;
          script.src = 'https://cdn.jsdelivr.net/npm/chart.js';
          script.async = true;
          script.onload = () => setChartLibLoaded(true);
          document.body.appendChild(script);
        } else {
          script.addEventListener('load', () => setChartLibLoaded(true));
        }
      }, []);

      useEffect(() => {
        if (!chartLibLoaded || !chartRef.current || !window.Chart) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const ctx = chartRef.current.getContext('2d');
        const labels = data.map(d => d.name);
        const scores = data.map(d => d.score);
        const averages = data.map(d => d.average);
        const selfScores = data.map(d => d.selfScore || 0);

        const datasets = [
          {
            label: 'あなたの点数',
            data: scores,
            backgroundColor: type === 'bar' ? 'rgba(59, 130, 246, 0.7)' : 'rgba(59, 130, 246, 0.2)',
            borderColor: 'rgb(59, 130, 246)',
            borderWidth: 2,
            pointBackgroundColor: 'rgb(59, 130, 246)',
          },
          {
            label: '平均点',
            data: averages,
            backgroundColor: type === 'bar' ? 'rgba(239, 68, 68, 0.7)' : 'rgba(239, 68, 68, 0.2)',
            borderColor: 'rgb(239, 68, 68)',
            borderWidth: 2,
            pointBackgroundColor: 'rgb(239, 68, 68)',
          }
        ];

        if (isSelfScoringEnabled) {
          datasets.push({
            label: '自己採点',
            data: selfScores,
            backgroundColor: type === 'bar' ? 'rgba(16, 185, 129, 0.7)' : 'rgba(16, 185, 129, 0.2)',
            borderColor: 'rgb(16, 185, 129)',
            borderWidth: 2,
            borderDash: [5, 5],
            pointBackgroundColor: 'rgb(16, 185, 129)',
          });
        }

        const config = {
          type: type === 'bar' ? 'bar' : 'radar',
          data: {
            labels,
            datasets: datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } },
            scales: type === 'bar' 
              ? { y: { beginAtZero: true } } 
              : { r: { beginAtZero: true, suggestedMax: 100, ticks: { stepSize: 20 } } }
          }
        };

        chartInstance.current = new window.Chart(ctx, config);
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [data, type, chartLibLoaded]);

      if (data.length === 0) {
        return (
          <div className="flex flex-col items-center justify-center h-full text-slate-400 p-8 text-center">
            <BarChart2 size={32} className="mb-2 opacity-30" />
            <p className="text-sm">データがありません。<br/>科目を追加してください。</p>
          </div>
        );
      }

      if (!chartLibLoaded) return <div className="flex justify-center items-center h-full"><div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>;

      return (
        <div className="relative h-full w-full min-h-[250px]">
          <canvas ref={chartRef}></canvas>
        </div>
      );
    };

    // 推移グラフ用コンポーネント (折れ線グラフ)
    const TrendChartView = ({ tests }) => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const [chartLibLoaded, setChartLibLoaded] = useState(!!window.Chart);

      useEffect(() => {
        if (window.Chart) {
          setChartLibLoaded(true);
        }
      }, []);

      useEffect(() => {
        if (!chartLibLoaded || !chartRef.current || !window.Chart) return;
        if (chartInstance.current) chartInstance.current.destroy();

        // 日付でソート
        const sortedTests = [...tests].sort((a, b) => new Date(a.date) - new Date(b.date));
        
        const labels = sortedTests.map(t => t.title.length > 10 ? t.title.substring(0, 10) + '...' : t.title);
        const totalScores = sortedTests.map(t => t.subjects.reduce((sum, s) => sum + s.score, 0));
        const totalAverages = sortedTests.map(t => t.subjects.reduce((sum, s) => sum + s.average, 0));

        const ctx = chartRef.current.getContext('2d');
        const config = {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: '合計得点',
                data: totalScores,
                borderColor: 'rgb(59, 130, 246)',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                borderWidth: 2,
                pointBackgroundColor: 'rgb(59, 130, 246)',
                tension: 0.3,
                fill: true,
              },
              {
                label: '合計平均点',
                data: totalAverages,
                borderColor: 'rgb(239, 68, 68)',
                backgroundColor: 'transparent',
                borderWidth: 2,
                borderDash: [5, 5],
                pointBackgroundColor: 'rgb(239, 68, 68)',
                tension: 0.3,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'top' },
              tooltip: {
                callbacks: {
                  afterTitle: (context) => {
                    const testIndex = context[0].dataIndex;
                    const test = sortedTests[testIndex];
                    return `(${test.date}) / ${test.subjects.length}科目`;
                  }
                }
              }
            },
            scales: {
              y: { beginAtZero: true, title: { display: true, text: '得点' } },
              x: { ticks: { maxRotation: 45, minRotation: 0 } }
            }
          }
        };

        chartInstance.current = new window.Chart(ctx, config);
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [tests, chartLibLoaded]);

      if (tests.length === 0) {
        return (
          <div className="flex flex-col items-center justify-center h-full text-slate-400 p-8 text-center">
            <TrendingUp size={32} className="mb-2 opacity-30" />
            <p className="text-sm">推移データがありません。<br/>テストを追加してください。</p>
          </div>
        );
      }
      
      if (!chartLibLoaded) return <div className="flex justify-center items-center h-full"><div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>;

      return (
        <div className="relative h-full w-full min-h-[250px]">
          <canvas ref={chartRef}></canvas>
        </div>
      );
    };

    function App() {
      // 共通ステート
      const [loading, setLoading] = useState(true);
      const [tests, setTests] = useState([]);
      const [events, setEvents] = useState([]);
      
      // ナビゲーションステート
      const [activeView, setActiveView] = useState('testList'); // 'testList', 'testDetail', 'schedule'
      const [activeTestId, setActiveTestId] = useState(null);
      const [detailTab, setDetailTab] = useState('dashboard'); // 'dashboard', 'report'

      // テスト一覧用ステート
      const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
      const [testTagFilter, setTestTagFilter] = useState('all');
      const [newTestTitle, setNewTestTitle] = useState('');
      const [newTestDate, setNewTestDate] = useState(todayStr);
      const [newTestTags, setNewTestTags] = useState('');
      const [newTestIsSelfScoring, setNewTestIsSelfScoring] = useState(false);

      const [editingTest, setEditingTest] = useState(null);
      const [editTestForm, setEditTestForm] = useState({ id: '', title: '', date: '', tagsInput: '', isSelfScoringEnabled: false });

      // テスト詳細（科目）用ステート
      const [subjectTagFilter, setSubjectTagFilter] = useState('all');
      const [chartType, setChartType] = useState('radar');
      const [editingSubject, setEditingSubject] = useState(null);
      
      const [subjName, setSubjName] = useState('');
      const [subjScore, setSubjScore] = useState('');
      const [subjAvg, setSubjAvg] = useState('');
      const [subjSelfScore, setSubjSelfScore] = useState('');
      const [subjTagsInput, setSubjTagsInput] = useState('');

      const [editForm, setEditForm] = useState({
        id: '', name: '', score: '', average: '', tagsInput: '', range: '', reflection: '', selfScore: ''
      });

      // スケジュール用ステート
      const [currentMonth, setCurrentMonth] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
      const [selectedDate, setSelectedDate] = useState(todayStr);
      const [taskInput, setTaskInput] = useState('');

      const STORAGE_KEY = 'test_score_analyzer_data';

      // データの読み込みとマイグレーション
      useEffect(() => {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
          try {
            const parsed = JSON.parse(savedData);
            let loadedTests = [];
            let loadedEvents = parsed.events || [];
            let needsSave = false;

            // 新しい形式 (tests配列がある)
            if (parsed.tests) {
              loadedTests = parsed.tests;
            } 
            // 古い形式 (subjects配列が直にある) からの移行
            else if (parsed.subjects) {
              if (parsed.subjects.length > 0) {
                const migratedTest = {
                  id: crypto.randomUUID(),
                  title: '過去のテストデータ',
                  date: todayStr,
                  tags: ['移行データ'],
                  isSelfScoringEnabled: false,
                  subjects: parsed.subjects,
                  studyPlan: parsed.studyPlan || ''
                };
                loadedTests = [migratedTest];
              }
              needsSave = true; // 新形式に変換したので保存フラグを立てる
            }

            // データの欠落を防ぐための安全なフォーマット処理 (エラー防止)
            loadedTests = loadedTests.map(test => ({
              ...test,
              tags: test.tags || [],
              subjects: (test.subjects || []).map(subject => ({
                ...subject,
                tags: subject.tags || [],
                score: Number(subject.score) || 0,
                average: Number(subject.average) || 0,
              }))
            }));

            setTests(loadedTests);
            setEvents(loadedEvents);

            // マイグレーションが発生した場合は新しい形式でローカルストレージをすぐに上書き
            if (needsSave) {
              localStorage.setItem(STORAGE_KEY, JSON.stringify({
                tests: loadedTests,
                events: loadedEvents
              }));
            }
          } catch (e) {
            console.error("データの読み込みに失敗しました", e);
            // 壊れたデータが原因でクラッシュするのを防ぐ
            setTests([]);
            setEvents([]);
          }
        }
        setLoading(false);
      }, []);

      // データの保存
      const saveData = (newTests, newEvents) => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          tests: newTests !== undefined ? newTests : tests,
          events: newEvents !== undefined ? newEvents : events
        }));
      };

      // --- テスト一覧画面のロジック ---
      const handleAddTest = (e) => {
        e.preventDefault();
        if (!newTestTitle.trim()) return;
        
        const tags = newTestTags.split(/[,、\s]+/).map(t => t.trim()).filter(t => t);
        const newTest = {
          id: crypto.randomUUID(),
          title: newTestTitle.trim(),
          date: newTestDate,
          tags,
          isSelfScoringEnabled: newTestIsSelfScoring,
          subjects: [],
          studyPlan: ''
        };
        
        const updatedTests = [...tests, newTest];
        setTests(updatedTests);
        saveData(updatedTests, events);
        
        setNewTestTitle('');
        setNewTestTags('');
        setNewTestIsSelfScoring(false);
      };

      const openEditTestModal = (test, e) => {
        e.stopPropagation();
        setEditTestForm({
          id: test.id,
          title: test.title,
          date: test.date,
          tagsInput: (test.tags || []).join(', '),
          isSelfScoringEnabled: !!test.isSelfScoringEnabled
        });
        setEditingTest(test);
      };

      const handleUpdateTest = (e) => {
        e.preventDefault();
        const tags = editTestForm.tagsInput.split(/[,、\s]+/).map(t => t.trim()).filter(t => t);
        const updatedTest = {
          ...editingTest,
          title: editTestForm.title,
          date: editTestForm.date,
          tags,
          isSelfScoringEnabled: editTestForm.isSelfScoringEnabled
        };
        const updatedTests = tests.map(t => t.id === updatedTest.id ? updatedTest : t);
        setTests(updatedTests);
        saveData(updatedTests, events);
        setEditingTest(null);
      };

      const handleDeleteTest = (id, e) => {
        e.stopPropagation();
        if(!window.confirm("このテストと中の成績データを全て削除しますか？")) return;
        const updatedTests = tests.filter(t => t.id !== id);
        setTests(updatedTests);
        saveData(updatedTests, events);
        if (testTagFilter !== 'all' && !updatedTests.some(t => t.tags.includes(testTagFilter))) {
          setTestTagFilter('all');
        }
      };

      const allTestTags = useMemo(() => {
        const tagSet = new Set();
        tests.forEach(t => (t.tags || []).forEach(tag => tagSet.add(tag)));
        return Array.from(tagSet);
      }, [tests]);

      const filteredTests = useMemo(() => {
        if (testTagFilter === 'all') return tests;
        return tests.filter(t => (t.tags || []).includes(testTagFilter));
      }, [tests, testTagFilter]);

      // --- テスト詳細画面のロジック ---
      const activeTest = useMemo(() => tests.find(t => t.id === activeTestId), [tests, activeTestId]);
      
      const updateActiveTest = (updates) => {
        if (!activeTestId) return;
        const updatedTests = tests.map(t => t.id === activeTestId ? { ...t, ...updates } : t);
        setTests(updatedTests);
        saveData(updatedTests, events);
      };

      const handleAddSubject = (e) => {
        e.preventDefault();
        if (!subjName || subjScore === '' || subjAvg === '' || !activeTest) return;
        
        const tags = subjTagsInput.split(/[,、\s]+/).map(t => t.trim()).filter(t => t);
        const newSubject = {
          id: crypto.randomUUID(),
          name: subjName,
          score: Number(subjScore),
          average: Number(subjAvg),
          selfScore: activeTest.isSelfScoringEnabled && subjSelfScore !== '' ? Number(subjSelfScore) : undefined,
          tags,
          range: '',
          reflection: ''
        };

        updateActiveTest({ subjects: [...activeTest.subjects, newSubject] });
        setSubjName(''); setSubjScore(''); setSubjAvg(''); setSubjTagsInput(''); setSubjSelfScore('');
      };

      const handleDeleteSubject = (id) => {
        if(!window.confirm("この科目を削除しますか？")) return;
        const newSubjects = activeTest.subjects.filter(s => s.id !== id);
        updateActiveTest({ subjects: newSubjects });
      };

      const openEditModal = (subject) => {
        setEditForm({
          id: subject.id,
          name: subject.name,
          score: subject.score,
          average: subject.average,
          selfScore: subject.selfScore !== undefined ? subject.selfScore : '',
          tagsInput: (subject.tags || []).join(', '),
          range: subject.range || '',
          reflection: subject.reflection || ''
        });
        setEditingSubject(subject);
      };

      const handleUpdateSubject = (e) => {
        e.preventDefault();
        const tags = editForm.tagsInput.split(/[,、\s]+/).map(t => t.trim()).filter(t => t);
        const updatedSubject = {
          ...editingSubject,
          name: editForm.name,
          score: Number(editForm.score),
          average: Number(editForm.average),
          selfScore: activeTest?.isSelfScoringEnabled && editForm.selfScore !== '' ? Number(editForm.selfScore) : undefined,
          tags,
          range: editForm.range,
          reflection: editForm.reflection
        };
        const newSubjects = activeTest.subjects.map(s => s.id === updatedSubject.id ? updatedSubject : s);
        updateActiveTest({ subjects: newSubjects });
        setEditingSubject(null);
      };

      const activeTestSubjects = activeTest?.subjects || [];
      const allSubjectTags = useMemo(() => {
        const tagSet = new Set();
        activeTestSubjects.forEach(s => (s.tags || []).forEach(t => tagSet.add(t)));
        return Array.from(tagSet);
      }, [activeTestSubjects]);

      const filteredSubjects = useMemo(() => {
        if (subjectTagFilter === 'all') return activeTestSubjects;
        return activeTestSubjects.filter(s => (s.tags || []).includes(subjectTagFilter));
      }, [activeTestSubjects, subjectTagFilter]);

      const formatNum = (num) => Math.round(num * 100) / 100;
      const totalScore = formatNum(filteredSubjects.reduce((sum, s) => sum + s.score, 0));
      const totalAverage = formatNum(filteredSubjects.reduce((sum, s) => sum + s.average, 0));
      const diff = formatNum(totalScore - totalAverage);
      
      const totalSelfScore = formatNum(filteredSubjects.reduce((sum, s) => sum + (s.selfScore || 0), 0));
      const selfScoreDiff = formatNum(totalScore - totalSelfScore);

      // --- スケジュール関連 ---
      const handleAddEvent = (e) => {
        e.preventDefault();
        if (!taskInput.trim() || !selectedDate) return;
        const newEvent = { id: crypto.randomUUID(), date: selectedDate, title: taskInput.trim() };
        const updatedEvents = [...events, newEvent];
        setEvents(updatedEvents);
        saveData(tests, updatedEvents);
        setTaskInput('');
      };

      const handleDeleteEvent = (id) => {
        const updatedEvents = events.filter(e => e.id !== id);
        setEvents(updatedEvents);
        saveData(tests, updatedEvents);
      };

      const getCalendarDays = () => {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const days = [];
        for (let i = 0; i < firstDay; i++) days.push(null);
        for (let i = 1; i <= daysInMonth; i++) {
          days.push(`${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`);
        }
        return days;
      };

      // --- レンダリング関数群 ---
      if (loading) return null;

      const renderHeader = () => (
        <header className="bg-white p-4 md:px-8 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center print:hidden mb-6">
          <h1 className="text-xl md:text-2xl font-extrabold text-slate-800 tracking-tight flex items-center gap-2">
            <TrendingUp className="text-blue-600" />
            Test Score Analyzer
          </h1>
          <div className="flex items-center gap-1.5 text-xs font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">
            <Save size={14} />
            <span className="hidden sm:inline">自動保存中</span>
          </div>
        </header>
      );

      const renderNav = () => (
        <div className="flex bg-slate-200 p-1 rounded-xl w-max mb-6 print:hidden">
          <button 
            onClick={() => { setActiveView('testList'); setActiveTestId(null); }}
            className={`px-4 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${activeView === 'testList' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
          >
            <Folder size={16}/> テスト一覧・推移
          </button>
          <button 
            onClick={() => { setActiveView('schedule'); setActiveTestId(null); }}
            className={`px-4 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${activeView === 'schedule' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
          >
            <Calendar size={16}/> スケジュール
          </button>
        </div>
      );

      const renderTestList = () => (
        <div className="space-y-6 animate-in fade-in duration-300">
          {/* 推移グラフセクション */}
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                  <TrendingUp size={20} className="text-blue-600"/> 成績推移グラフ
                </h2>
                <p className="text-xs text-slate-500 mt-1">タグで絞り込むと、同じ種類のテストの推移を比較しやすくなります。</p>
              </div>
              
              {tests.length > 0 && (
                <div className="flex flex-wrap items-center gap-2">
                  <span className="text-sm font-bold text-slate-500 flex items-center gap-1"><Filter size={16} /> 種類:</span>
                  <select 
                    value={testTagFilter} 
                    onChange={e => setTestTagFilter(e.target.value)}
                    className="bg-slate-50 border border-slate-200 text-sm font-bold text-slate-700 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="all">すべてのテスト</option>
                    {allTestTags.map(tag => (
                      <option key={tag} value={tag}>{tag}</option>
                    ))}
                  </select>
                </div>
              )}
            </div>
            <div className="w-full h-64 sm:h-80">
              <TrendChartView tests={filteredTests} />
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* テスト作成フォーム */}
            <div className="lg:col-span-1">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-6">

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2">タスク内容</label>
                    <input type="text" required value={taskInput} onChange={e => setTaskInput(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="例: 数学 ワークp10-12" />
                  </div>
                  <div className="space-y-3 pt-2">
                    <div>
                      <span className="text-[10px] font-bold text-slate-400 block mb-1.5">よく使うキーワード</span>
                      <div className="flex flex-wrap gap-1.5">
                        {['ワーク', 'プリント', '暗記', '復習', '過去問', 'テスト勉強'].map(word => (
                          <button key={word} type="button" onClick={() => setTaskInput(prev => prev ? `${prev} ${word}` : word)} className="text-xs bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-2.5 py-1.5 rounded-lg border border-emerald-200 transition-colors">{word}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                  <button type="submit" disabled={!selectedDate} className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-3 rounded-xl transition-colors shadow-sm mt-4">追加する</button>
                </form>
              </div>
            </div>

            <div className="lg:col-span-8 bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200 print:border-none print:shadow-none print:col-span-12 print:p-0">
              <div className="flex justify-between items-center mb-6">
                <div className="flex items-center gap-4 print:hidden">
                  <button onClick={prevMonth} className="p-2 hover:bg-slate-100 rounded-full text-slate-600 transition-colors"><ChevronLeft size={20}/></button>
                  <h3 className="text-xl font-bold text-slate-800">{currentMonth.getFullYear()}年 {currentMonth.getMonth() + 1}月</h3>
                  <button onClick={nextMonth} className="p-2 hover:bg-slate-100 rounded-full text-slate-600 transition-colors"><ChevronRight size={20}/></button>
                </div>
                <h3 className="text-2xl font-black text-slate-800 hidden print:block">{currentMonth.getFullYear()}年 {currentMonth.getMonth() + 1}月 スケジュール</h3>
                <button onClick={() => window.print()} className="print:hidden flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-xl text-sm font-bold transition-colors"><Printer size={16} /> 印刷</button>
              </div>

              <div className="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-xl overflow-hidden print:border-slate-800 print:bg-slate-800 print:gap-px">
                {['日', '月', '火', '水', '木', '金', '土'].map(day => (
                  <div key={day} className="bg-slate-50 text-center py-2 text-xs font-bold text-slate-500 print:bg-white print:text-black">{day}</div>
                ))}
                
                {getCalendarDays().map((dateString, index) => {
                  const isToday = dateString === todayStr;
                  const isSelected = dateString === selectedDate;
                  const dayEvents = dateString ? events.filter(e => e.date === dateString) : [];
                  const dayTests = dateString ? tests.filter(t => t.date === dateString) : []; // テスト日もカレンダーに表示

                  return (
                    <div 
                      key={index} onClick={() => dateString && setSelectedDate(dateString)}
                      className={`min-h-[100px] sm:min-h-[120px] bg-white p-1 sm:p-2 cursor-pointer transition-colors relative print:min-h-[120px] ${!dateString ? 'bg-slate-50/50 cursor-default print:bg-slate-100' : 'hover:bg-blue-50/50 print:bg-white'} ${isSelected ? 'ring-2 ring-inset ring-blue-500 bg-blue-50/20' : ''}`}
                    >
                      {dateString && (
                        <>
                          <div className={`text-xs font-bold mb-1 w-6 h-6 flex items-center justify-center rounded-full ${isToday ? 'bg-blue-600 text-white print:bg-transparent print:text-black print:border-2 print:border-black' : 'text-slate-600'}`}>
                            {parseInt(dateString.split('-')[2], 10)}
                          </div>
                          <div className="space-y-1">
                            {/* テスト予定の表示 */}
                            {dayTests.map(test => (
                              <div key={`test-${test.id}`} onClick={(e) => { e.stopPropagation(); setActiveTestId(test.id); setActiveView('testDetail'); setDetailTab('dashboard'); }} className="group relative bg-amber-50 border border-amber-200 text-amber-800 text-[10px] sm:text-xs font-bold rounded px-1.5 py-1 leading-tight break-words cursor-pointer hover:bg-amber-100 print:bg-white print:border-slate-300 print:text-black">
                                📝 {test.title}
                              </div>
                            ))}
                            {/* 通常タスクの表示 */}
                            {dayEvents.map(event => (
                              <div key={event.id} className="group relative bg-blue-50 border border-blue-100 text-blue-800 text-[10px] sm:text-xs rounded px-1.5 py-1 leading-tight break-words print:bg-white print:border-slate-300 print:text-black">
                                {event.title}
                                <button onClick={(e) => { e.stopPropagation(); handleDeleteEvent(event.id); }} className="absolute top-0.5 right-0.5 text-blue-400 hover:text-red-500 bg-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity print:hidden"><X size={10} /></button>
                              </div>
                            ))}
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen p-4 md:p-8 print:p-0 print:bg-white">
          <div className="max-w-6xl mx-auto space-y-2 print:space-y-0 print:max-w-none">
            {renderHeader()}
            {renderNav()}
            
            <main>
              {activeView === 'testList' && renderTestList()}
              {activeView === 'testDetail' && renderTestDetail()}
              {activeView === 'schedule' && renderSchedule()}
            </main>
          </div>

          {/* テスト編集用モーダル */}
          {editingTest && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex justify-center items-center p-4 print:hidden animate-in fade-in duration-200">
              <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl flex flex-col">
                <div className="flex justify-between items-center p-5 border-b border-slate-100">
                  <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Settings size={18} className="text-blue-600"/> テスト設定の編集</h3>
                  <button onClick={() => setEditingTest(null)} className="text-slate-400 hover:text-slate-700 p-1 bg-slate-100 rounded-full"><X size={20} /></button>
                </div>
                <form onSubmit={handleUpdateTest} className="p-6 space-y-5">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">テスト名</label>
                    <input type="text" required value={editTestForm.title} onChange={e => setEditTestForm({...editTestForm, title: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">実施日</label>
                    <input type="date" required value={editTestForm.date} onChange={e => setEditTestForm({...editTestForm, date: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">タグ (カンマ区切り)</label>
                    <input type="text" value={editTestForm.tagsInput} onChange={e => setEditTestForm({...editTestForm, tagsInput: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500" />
                  </div>
                  <label className="flex items-center gap-2 cursor-pointer mt-2 p-3 bg-slate-50 rounded-xl border border-slate-200">
                    <input 
                      type="checkbox" 
                      checked={editTestForm.isSelfScoringEnabled} 
                      onChange={e => setEditTestForm({...editTestForm, isSelfScoringEnabled: e.target.checked})} 
                      className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" 
                    />
                    <div>
                      <span className="text-sm font-bold text-slate-700 block">自己採点を有効化</span>
                      <span className="text-xs text-slate-500">自己採点と実際の得点のズレを分析します</span>
                    </div>
                  </label>
                  <div className="pt-2">
                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-colors shadow-sm">設定を保存する</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 科目編集用モーダル */}
          {editingSubject && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex justify-center items-center p-4 print:hidden animate-in fade-in duration-200">
              <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center p-5 border-b border-slate-100">
                  <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Edit2 size={18} className="text-blue-600"/> 科目データの編集</h3>
                  <button onClick={() => setEditingSubject(null)} className="text-slate-400 hover:text-slate-700 p-1 bg-slate-100 rounded-full"><X size={20} /></button>
                </div>
                <form onSubmit={handleUpdateSubject} className="p-6 overflow-y-auto custom-scrollbar space-y-5">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1.5">教科名</label>
                      <input type="text" required value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1.5">タグ (カンマ区切り)</label>
                      <input type="text" value={editForm.tagsInput} onChange={e => setEditForm({...editForm, tagsInput: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1.5">あなたの点数</label>
                      <input type="number" required step="0.1" value={editForm.score} onChange={e => setEditForm({...editForm, score: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-mono text-lg" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1.5">平均点</label>
                      <input type="number" required step="0.1" value={editForm.average} onChange={e => setEditForm({...editForm, average: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-mono text-lg" />
                    </div>
                    {activeTest?.isSelfScoringEnabled && (
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1.5 text-emerald-600">自己採点</label>
                        <input type="number" step="0.1" value={editForm.selfScore} onChange={e => setEditForm({...editForm, selfScore: e.target.value})} className="w-full px-4 py-2.5 bg-emerald-50 border border-emerald-200 rounded-xl focus:ring-2 focus:ring-emerald-500 font-mono text-lg" />
                      </div>
                    )}
                  </div>
                  <div className="pt-4 border-t border-slate-100">
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">テスト範囲 (任意)</label>
                    <textarea value={editForm.range} onChange={e => setEditForm({...editForm, range: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 h-20 resize-y text-sm" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1.5">反省点・メモ (任意)</label>
                    <textarea value={editForm.reflection} onChange={e => setEditForm({...editForm, reflection: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 h-28 resize-y text-sm" />
                  </div>
                  <div className="pt-2">
                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-colors shadow-sm">変更を保存する</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
